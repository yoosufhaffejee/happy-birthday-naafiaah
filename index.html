          <path class="prelude-line prelude-bloom" pathLength="1" d="M101 64 C110 47 128 43 140 54 C128 65 115 70 101 64Z M92 66 C76 47 83 25 106 22 C130 19 145 38 143 57"/>
          <use class="rose-ghost" href="#roseShape" filter="url(#redGlow)"/>

          <use class="rose-line" href="#roseShape" filter="url(#redGlow)"/>
          <use class="spark-trace" href="#roseShape" filter="url(#redGlow)"/>
        </g>
      </svg>
    </div>

    <section class="wish" aria-live="polite">
      <h1>
        <span class="line">Happy Birthday,</span>
        <span class="line">Naafiaah</span>
      </h1>
      <p class="birthday-note"></p>
    </section>

    <button class="start-button" type="button" aria-label="Start the rose animation">
      <span>Tap to bloom</span>
    </button>

    <button class="mute-button" type="button" aria-label="Mute music" aria-pressed="false">
      <span class="sound-on">Sound on</span>
      <span class="sound-off">Muted</span>
    </button>

    <audio id="birthday-music" src="./Roses_Background_Music_cropped.mp3" preload="auto" loop></audio>
  </main>
  <script src="./script.js"></script>
</body>
</html>
